<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>para ti Theo :3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Quicksand', sans-serif;
  }

  #universe-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    display: block;
  }

  #title {
    position: fixed;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: #ffb6c1;
    text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
    animation: titlePulse 3s ease-in-out infinite;
    white-space: nowrap;
    pointer-events: none;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493; }
    50% { text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493, 0 0 100px #ffb6c1; }
  }

  #music-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 20;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #ff69b4;
    border: 2px solid #ffb6c1;
    color: white;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 0 20px #ff1493;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }

  #music-btn:hover { transform: scale(1.1); }

  #intro {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 1.5s ease;
  }

  #intro h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2.5rem, 12vw, 5rem);
    color: #ffb6c1;
    text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493;
    text-align: center;
  }

  #enter-btn {
    padding: 15px 45px;
    background: #ff69b4;
    border: none;
    border-radius: 50px;
    color: white;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 0 30px #ff1493;
    transition: transform 0.2s;
  }

  #enter-btn:hover { transform: scale(1.05); }

  #intro p {
    color: rgba(255,182,193,0.7);
    font-size: 0.9rem;
  }

  /* SOBRES FLOTANTES HTML */
  .envelope {
    position: fixed;
    width: 90px;
    height: 90px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    cursor: grab;
    z-index: 50;
    filter: drop-shadow(0 0 10px rgba(255,105,180,0.5));
    transition: filter 0.2s;
    will-change: transform, left, top;
    user-select: none;
    touch-action: none;
  }

  .envelope:hover {
    filter: drop-shadow(0 0 20px #ff69b4) drop-shadow(0 0 10px #ff1493);
  }

  .envelope:active {
    cursor: grabbing;
  }

  .envelope-label {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffb6c1;
    font-size: 12px;
    font-weight: 600;
    text-shadow: 0 0 10px #ff69b4;
    white-space: nowrap;
    background: rgba(0,0,0,0.5);
    padding: 2px 8px;
    border-radius: 20px;
    backdrop-filter: blur(5px);
    border: 1px solid #ff69b4;
    pointer-events: none;
  }

  /* CARD MODAL */
  #card-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.0);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(0px);
  }

  #card-overlay.active {
    opacity: 1;
    pointer-events: all;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
  }

  .card-box {
    position: relative;
    width: min(85vw, 380px);
    min-height: 380px;
    background: linear-gradient(135deg, #0a0008 0%, #1a0a15 100%);
    border-radius: 25px;
    border: 2px solid #ff69b4;
    box-shadow: 0 0 40px #ff1493, inset 0 0 20px rgba(255,105,180,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 25px;
    gap: 20px;
    transform: scale(0.8);
    transition: transform 0.3s ease;
  }

  #card-overlay.active .card-box { transform: scale(1); }

  .card-title {
    font-family: 'Pacifico', cursive;
    font-size: 1.8rem;
    color: #ffb6c1;
    text-shadow: 0 0 15px #ff69b4;
  }

  .card-text {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 1.3rem;
    color: #fff;
    text-align: center;
    line-height: 1.6;
  }

  .card-emoji {
    font-size: 2.5rem;
  }

  .card-close-hint {
    font-size: 0.75rem;
    color: rgba(255,182,193,0.5);
    position: absolute;
    bottom: 15px;
  }

  #hint {
    position: fixed;
    bottom: 30px;
    left: 30px;
    z-index: 20;
    color: rgba(255,182,193,0.5);
    font-size: 0.8rem;
    pointer-events: none;
  }
</style>
</head>

<div id="intro">
  <h1>para ti Theo :3</h1>

<div id="title">para ti Theo :3</div>

<canvas id="universe-canvas"></canvas>

<audio id="bgmusic" loop>

<div id="envelope2" class="envelope" data-card="1">

  <span class="envelope-label">Carta 3 💌</span>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  
  const canvas = document.getElementById('universe-canvas');
  const renderer = new THREE.WebGLRenderer({ 
    canvas, 
    antialias: true, 
    alpha: false,
    powerPreference: "high-performance"
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setClearColor(0x020208);
  
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020208);
  
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(5, 2, 9);
  
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.035;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.25;
  controls.enableZoom = true;
  controls.enablePan = true;
  controls.maxPolarAngle = Math.PI / 1.8;
  controls.minDistance = 3;
  controls.maxDistance = 18;
  controls.target.set(0, 0, 0);
  
  const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambientLight);
  
  const light1 = new THREE.PointLight(0xff6699, 0.8, 25);
  light1.position.set(2, 3, 4);
  scene.add(light1);
  
  const light2 = new THREE.PointLight(0x6688ff, 0.5, 30);
  light2.position.set(-3, 1, 5);
  scene.add(light2);
  
  const universeGroup = new THREE.Group();
  scene.add(universeGroup);
  
  // --- AGUJERO NEGRO ---
  const blackHoleGroup = new THREE.Group();
  
  const bhGeo = new THREE.SphereGeometry(1.0, 32, 16);
  const bhMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x1a0a1a, roughness: 0.2 });
  const blackHole = new THREE.Mesh(bhGeo, bhMat);
  blackHoleGroup.add(blackHole);
  
  const diskGeo = new THREE.RingGeometry(1.15, 1.8, 48);
  const diskMat = new THREE.MeshStandardMaterial({ color: 0xff88aa, emissive: 0xff4488, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
  const disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotation.x = Math.PI / 2 + 0.2;
  disk.rotation.z = 0.5;
  blackHoleGroup.add(disk);
  
  const disk2Geo = new THREE.RingGeometry(1.9, 2.5, 48);
  const disk2Mat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x3366cc, side: THREE.DoubleSide, transparent: true, opacity: 0.35 });
  const disk2 = new THREE.Mesh(disk2Geo, disk2Mat);
  disk2.rotation.x = Math.PI / 2 - 0.1;
  disk2.rotation.z = -0.3;
  blackHoleGroup.add(disk2);
  
  const photonRingGeo = new THREE.TorusGeometry(1.05, 0.015, 12, 80);
  const photonRingMat = new THREE.MeshStandardMaterial({ color: 0xffaacc, emissive: 0xff66aa, transparent: true, opacity: 0.85 });
  const photonRing = new THREE.Mesh(photonRingGeo, photonRingMat);
  photonRing.rotation.x = Math.PI / 2;
  photonRing.rotation.z = 0.2;
  blackHoleGroup.add(photonRing);
  
  universeGroup.add(blackHoleGroup);
  
  // --- PARTÍCULAS ---
  const particlesGeo = new THREE.BufferGeometry();
  const particlesCount = 2500;
  const positions = new Float32Array(particlesCount * 3);
  const colors = new Float32Array(particlesCount * 3);
  
  const colorPink = new THREE.Color(0xff99bb);
  const colorPurple = new THREE.Color(0xbb88ee);
  const colorBlue = new THREE.Color(0x88aaff);
  
  for (let i = 0; i < particlesCount; i++) {
    const r = 1.8 + Math.pow(Math.random(), 1.4) * 5.5;
    const angle = (i * 0.9) + r * 1.1;
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    const y = Math.sin(angle * 1.1) * 0.18 * r;
    positions[i*3] = x;
    positions[i*3+1] = y;
    positions[i*3+2] = z;
    
    let color;
    if (r < 2.8) color = colorPink.clone().lerp(colorPurple, (r - 1.8) / 1);
    else color = colorPurple.clone().lerp(colorBlue, (r - 2.8) / 4.5);
    color.multiplyScalar(0.7 + Math.random() * 0.4);
    
    colors[i*3] = color.r;
    colors[i*3+1] = color.g;
    colors[i*3+2] = color.b;
  }
  
  particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  universeGroup.add(new THREE.Points(particlesGeo, new THREE.PointsMaterial({ size: 0.038, sizeAttenuation: true, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true })));
  
  // Estrellas
  const starsGeo = new THREE.BufferGeometry();
  const starsPos = new Float32Array(400 * 3);
  for (let i = 0; i < 400; i++) {
    const r = 12 + Math.random() * 22;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random()*2)-1);
    starsPos[i*3] = Math.sin(phi)*Math.cos(theta)*r;
    starsPos[i*3+1] = Math.sin(phi)*Math.sin(theta)*r * 0.3;
    starsPos[i*3+2] = Math.cos(phi)*r;
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
  universeGroup.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, sizeAttenuation: true })));

  // --- IMÁGENES FLOTANDO ALREDEDOR DEL AGUJERO (INCLUYE EL SOBRE CERRADO) ---
  const allFloatingMeshes = [];
  
  const imageUrls = [
    'https://raw.githubusercontent.com/RodrigoGreyrat/Musica/main/1000007483-removebg-preview.png',
    'https://raw.githubusercontent.com/RodrigoGreyrat/Musica/main/1000007484-removebg-preview.png',
    'https://raw.githubusercontent.com/RodrigoGreyrat/Musica/main/1000007481-removebg-preview.png',
    'https://raw.githubusercontent.com/RodrigoGreyrat/Musica/main/1000007482-removebg-preview%20(2).png',
    'https://raw.githubusercontent.com/RodrigoGreyrat/Musica/main/1000007530-removebg-preview.png' // NUEVA IMAGEN
  ];
  
  const textureLoader = new THREE.TextureLoader();
  
  for (let i = 0; i < 10; i++) {
    const texture = textureLoader.load(imageUrls[i % imageUrls.length]);
    const material = new THREE.MeshStandardMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
    const geometry = new THREE.PlaneGeometry(0.9, 0.75);
    const mesh = new THREE.Mesh(geometry, material);
    
    const angle = (i / 10) * Math.PI * 2;
    const radius = 2.8 + (i % 3) * 0.5;
    const height = Math.sin(i * 1.3) * 0.9;
    
    mesh.position.x = Math.cos(angle) * radius;
    mesh.position.z = Math.sin(angle) * radius;
    mesh.position.y = height;
    
    mesh.userData = { type: 'decoration', angle, radius, height, speed: 0.0006 };
    
    universeGroup.add(mesh);
    allFloatingMeshes.push(mesh);
  }
  
  // Emojis flotantes
  const emojiList = ['💕', '🌸', '✨', '💖', '🌙', '⭐'];
  for (let i = 0; i < 6; i++) {
    const canvas = document.createElement('canvas');
    canvas.width = 48;
    canvas.height = 48;
    const ctx = canvas.getContext('2d');
    ctx.font = '36px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emojiList[i], 24, 24);
    
    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.MeshStandardMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
    const geometry = new THREE.PlaneGeometry(0.4, 0.4);
    const mesh = new THREE.Mesh(geometry, material);
    
    const angle = (i / 6) * Math.PI * 2 + 0.5;
    const radius = 2.2;
    const height = Math.sin(i * 2) * 0.6;
    
    mesh.position.x = Math.cos(angle) * radius;
    mesh.position.z = Math.sin(angle) * radius;
    mesh.position.y = height;
    
    mesh.userData = { type: 'emoji', angle, radius, height, speed: 0.001 };
    
    universeGroup.add(mesh);
    allFloatingMeshes.push(mesh);
  }
  
  // Animación
  const clock = new THREE.Clock();
  
  function animate() {
    const delta = clock.getDelta();
    const elapsedTime = performance.now() * 0.001;
    
    controls.update();
    universeGroup.rotation.y += 0.0004;
    disk.rotation.y += 0.002;
    disk2.rotation.y -= 0.0015;
    photonRing.rotation.y += 0.003;
    
    allFloatingMeshes.forEach(mesh => {
      mesh.userData.angle += mesh.userData.speed * delta * 30;
      mesh.position.x = Math.cos(mesh.userData.angle) * mesh.userData.radius;
      mesh.position.z = Math.sin(mesh.userData.angle) * mesh.userData.radius;
      mesh.position.y = mesh.userData.height + Math.sin(elapsedTime * 0.45 + mesh.userData.angle) * 0.1;
      mesh.quaternion.copy(camera.quaternion);
    });
    
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

<script>
  // --- SOBRES HTML ARRASTRABLES ---
  const envelopeImage = 'https://raw.githubusercontent.com/RodrigoGreyrat/Musica/main/1000007528-removebg-preview.png';
  
  const envelopes = [
    { el: document.getElementById('envelope1'), card: 0 },
    { el: document.getElementById('envelope2'), card: 1 },
    { el: document.getElementById('envelope3'), card: 2 },
    { el: document.getElementById('envelope4'), card: 3 }
  ];
  
  envelopes.forEach(e => {
    e.el.style.backgroundImage = `url('${envelopeImage}')`;
  });
  
  // Posiciones iniciales
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  
  envelopes.forEach((e, i) => {
    const angle = (i / envelopes.length) * Math.PI * 2;
    e.el.style.left = (centerX + Math.cos(angle) * 160 - 45) + 'px';
    e.el.style.top = (centerY + Math.sin(angle) * 100 - 45) + 'px';
  });
  
  // Física de arrastre
  let dragging = null;
  let dragOffsetX = 0, dragOffsetY = 0;
  let velocityX = 0, velocityY = 0;
  let lastX = 0, lastY = 0;
  let lastTime = 0;
  let animationFrame = null;
  let dragStarted = false;
  let startX = 0, startY = 0;
  
  function startDrag(e, envelope) {
    e.preventDefault();
    dragging = envelope;
    const rect = envelope.el.getBoundingClientRect();
    
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    
    dragOffsetX = clientX - rect.left;
    dragOffsetY = clientY - rect.top;
    lastX = clientX;
    lastY = clientY;
    startX = clientX;
    startY = clientY;
    lastTime = performance.now();
    velocityX = velocityY = 0;
    dragStarted = true;
    
    envelope.el.style.transition = 'none';
    envelope.el.style.zIndex = '100';
    
    if (animationFrame) cancelAnimationFrame(animationFrame);
  }
  
  function onDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    
    const now = performance.now();
    const dt = Math.max(1, now - lastTime);
    velocityX = (clientX - lastX) / dt * 16;
    velocityY = (clientY - lastY) / dt * 16;
    
    lastX = clientX;
    lastY = clientY;
    lastTime = now;
    
    dragging.el.style.left = (clientX - dragOffsetX) + 'px';
    dragging.el.style.top = (clientY - dragOffsetY) + 'px';
  }
  
  function stopDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    
    dragging.el.style.zIndex = '50';
    dragging.el.style.transition = '';
    
    const dist = Math.sqrt(Math.pow(lastX - startX, 2) + Math.pow(lastY - startY, 2));
    
    // Si el movimiento fue menor a 10px, es un click
    if (dist < 10) {
      openCard(dragging.card);
      dragging = null;
      dragStarted = false;
      return;
    }
    
    // Aplicar física de lanzamiento
    let vx = velocityX * 0.5;
    let vy = velocityY * 0.5;
    
    const rect = dragging.el.getBoundingClientRect();
    let x = rect.left;
    let y = rect.top;
    
    const friction = 0.96;
    const bounce = 0.5;
    const minX = 0, maxX = window.innerWidth - rect.width;
    const minY = 0, maxY = window.innerHeight - rect.height;
    
    function physics() {
      vx *= friction;
      vy *= friction;
      
      x += vx;
      y += vy;
      
      if (x < minX) { x = minX; vx = -vx * bounce; }
      if (x > maxX) { x = maxX; vx = -vx * bounce; }
      if (y < minY) { y = minY; vy = -vy * bounce; }
      if (y > maxY) { y = maxY; vy = -vy * bounce; }
      
      dragging.el.style.left = x + 'px';
      dragging.el.style.top = y + 'px';
      
      if (Math.abs(vx) > 0.1 || Math.abs(vy) > 0.1) {
        animationFrame = requestAnimationFrame(physics);
      } else {
        animationFrame = null;
      }
    }
    
    physics();
    dragging = null;
    dragStarted = false;
  }
  
  envelopes.forEach(e => {
    const el = e.el;
    el.addEventListener('mousedown', (ev) => startDrag(ev, e));
    el.addEventListener('touchstart', (ev) => startDrag(ev, e), { passive: false });
  });
  
  window.addEventListener('mousemove', onDrag);
  window.addEventListener('touchmove', onDrag, { passive: false });
  window.addEventListener('mouseup', stopDrag);
  window.addEventListener('touchend', stopDrag);
  window.addEventListener('touchcancel', stopDrag);
  
  document.querySelectorAll('.envelope').forEach(el => {
    el.addEventListener('dragstart', e => e.preventDefault());
  });
  
  function openCard(index) {
    const cardTitle = document.getElementById('card-title');
    const cardEmoji = document.getElementById('card-emoji');
    const cardText = document.getElementById('card-text');
    const overlay = document.getElementById('card-overlay');
    
    const messages = [
      { title: 'Carta 1', emoji: '🌸✨', text: 'Ojalá nunca te falten motivos para sonreír y soñar en grande.' },
      { title: 'Carta 2', emoji: '💖🌟', text: 'Admiro la forma en que haces bonito hasta los días simples.' },
      { title: 'Carta 3', emoji: '💝🌷', text: 'Este detalle es para recordarte lo especial que eres para mí.' },
      { title: 'Carta 4', emoji: '😽💞', text: 'Vos eres la única persona que me hace feliz, por eso quiero que estés conmigo siempre.' }
    ];
    
    cardTitle.textContent = messages[index].title;
    cardEmoji.textContent = messages[index].emoji;
    cardText.textContent = messages[index].text;
    overlay.classList.add('active');
  }
  
  window.openCard = openCard;
  
  // UI Scripts
  const audio = document.getElementById('bgmusic');
  const musicBtn = document.getElementById('music-btn');
  let playing = false;
  
  audio.loop = true;
  
  musicBtn.addEventListener('click', () => {
    if (playing) {
      audio.pause();
      musicBtn.textContent = '🎵';
    } else {
      audio.play().catch(() => {});
      musicBtn.textContent = '⏸';
    }
    playing = !playing;
  });
  
  const intro = document.getElementById('intro');
  document.getElementById('enter-btn').addEventListener('click', () => {
    intro.style.opacity = '0';
    audio.play().catch(() => {});
    playing = true;
    musicBtn.textContent = '⏸';
    setTimeout(() => intro.style.display = 'none', 1500);
  });
  
  const overlay = document.getElementById('card-overlay');
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
  
  window.addEventListener('resize', () => {
    envelopes.forEach(e => {
      const rect = e.el.getBoundingClientRect();
      if (rect.left < 0) e.el.style.left = '0px';
      if (rect.top < 0) e.el.style.top = '0px';
      if (rect.right > window.innerWidth) e.el.style.left = (window.innerWidth - rect.width) + 'px';
      if (rect.bottom > window.innerHeight) e.el.style.top = (window.innerHeight - rect.height) + 'px';
    });
  });
</script>
</body>
</html>
